services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://router_user:router_pass@db:3306/router_mgmt
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-use-strong-random-key}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32-byte-encryption-key-here!!}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backups:/var/router-mgmt/backups
    depends_on:
      - db
      - redis
    networks:
      - router-mgmt-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - router-mgmt-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=router_mgmt
      - MYSQL_USER=router_user
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-router_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - router-mgmt-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - router-mgmt-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  router-mgmt-network:
    driver: bridge
